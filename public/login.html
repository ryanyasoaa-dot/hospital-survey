<!DOCTYPE html>
<html lang="tl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Hospital Survey</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Roboto', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #4a90e2 0%, #7ed321 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.15);
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
        }
        .login-card h1 { font-size: 24px; font-weight: 500; color: #202124; margin-bottom: 6px; }
        .login-card p { font-size: 14px; color: #5f6368; margin-bottom: 32px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 14px; font-weight: 500; color: #202124; margin-bottom: 6px; }
        .form-group input {
            width: 100%; padding: 12px 14px;
            border: 1px solid #e8eaed; border-radius: 4px;
            font-size: 15px; transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none; border-color: #4a90e2;
            box-shadow: 0 0 0 3px rgba(74,144,226,0.1);
        }
        .error-box {
            background: #fde7e1; color: #d33b27;
            padding: 12px 14px; border-radius: 4px;
            font-size: 14px; margin-bottom: 20px; display: none;
        }
        .btn-login {
            width: 100%; padding: 13px;
            background: #4a90e2; color: white;
            border: none; border-radius: 4px;
            font-size: 15px; font-weight: 500;
            cursor: pointer; transition: background 0.2s;
        }
        .btn-login:hover { background: #357abd; }
        .btn-login:disabled { opacity: 0.7; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>🔒 Admin Login</h1>
        <p>Hospital Survey Dashboard</p>
        <div class="error-box" id="errorBox"></div>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn-login" id="loginBtn">Mag-login</button>
        </form>
    </div>
    <script>
        if (localStorage.getItem('admin_token')) {
            window.location.href = 'admin.html';
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errorBox = document.getElementById('errorBox');
            btn.disabled = true;
            btn.textContent = 'Naglo-login...';
            errorBox.style.display = 'none';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('admin_token', data.token);
                    localStorage.setItem('admin_username', data.username);
                    window.location.href = 'admin.html';
                } else {
                    errorBox.textContent = data.message;
                    errorBox.style.display = 'block';
                }
            } catch {
                errorBox.textContent = 'Connection error. Try again.';
                errorBox.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Mag-login';
            }
        });
    </script>
</body>
</html>
